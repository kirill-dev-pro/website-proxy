worker_processes 1;
events {
    worker_connections 1024;
}

http {
    # Logging
    log_format proxy '$remote_addr - $remote_user [$time_local] "$request" '
                     '$status $body_bytes_sent "$http_referer" '
                     '"$http_user_agent" "$http_authorization"';
    access_log /var/log/nginx/access.log proxy;

    # Docker DNS first, then fallback to Google DNS (IPv4 only to avoid IPv6 issues)
    resolver 127.0.0.11 8.8.8.8 8.8.4.4 valid=10s ipv6=off;
    resolver_timeout 5s;

    upstream target {
        server ${TARGET_HOST}:443;
    }

    server {
        listen 80;

        location /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass https://target;
            proxy_ssl_server_name on;
            proxy_ssl_name ${TARGET_HOST};
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_set_header Host ${TARGET_HOST};
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass through all headers including Authorization
            proxy_pass_request_headers on;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Fix for "upstream sent too big header"
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 24k;

            # Streaming (SSE / chunked)
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;
            chunked_transfer_encoding on;
        }
    }
}
