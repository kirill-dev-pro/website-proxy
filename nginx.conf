worker_processes 1;
events {
    worker_connections 1024;
}

http {
    # Logging with better format
    log_format proxy '[$time_local] $remote_addr - "$request" '
                     'status=$status bytes=$body_bytes_sent '
                     'ref="$http_referer" '
                     'ua="$http_user_agent"';
    access_log /var/log/nginx/access.log proxy;

    # Map to track if request was blocked by IP filter
    map $status $ip_blocked {
        403 1;
        default 0;
    }

    # Docker DNS first, then fallback to Google DNS (IPv4 only to avoid IPv6 issues)
    # Using variable in proxy_pass forces runtime DNS resolution (respects ipv6=off)
    resolver 127.0.0.11 8.8.8.8 8.8.4.4 valid=10s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;

        # Trust proxy headers from Docker networks (Traefik/Dokploy)
        # This allows nginx to see real client IP from X-Forwarded-For
        set_real_ip_from 10.0.0.0/8;      # Docker overlay networks
        set_real_ip_from 172.16.0.0/12;   # Docker bridge networks  
        set_real_ip_from 192.168.0.0/16;  # Local networks
        real_ip_header X-Forwarded-For;
        real_ip_recursive on;

        # IP filtering - deny takes priority over allow
        # IP_FILTERING_PLACEHOLDER

        # Custom 403 error page for IP-blocked requests
        error_page 403 /ip_blocked;
        location = /ip_blocked {
            internal;
            default_type text/plain;
            return 403 "Access Denied: IP $remote_addr is not allowed.\n";
        }

        location /health {
            return 200 "OK";
            add_header Content-Type text/plain;
        }

        # Set target host for dynamic resolution (forces IPv4 due to resolver ipv6=off)
        set $target_backend ${TARGET_HOST};

        location / {
            proxy_pass https://$target_backend:443;
            proxy_ssl_server_name on;
            proxy_ssl_name ${TARGET_HOST};
            proxy_ssl_protocols TLSv1.2 TLSv1.3;
            proxy_set_header Host ${TARGET_HOST};
            proxy_set_header X-Forwarded-Proto $scheme;

            # Pass through all headers including Authorization
            proxy_pass_request_headers on;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Fix for "upstream sent too big header"
            proxy_buffer_size 16k;
            proxy_buffers 8 16k;
            proxy_busy_buffers_size 24k;

            # Streaming (SSE / chunked)
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;
            chunked_transfer_encoding on;
        }
    }
}
